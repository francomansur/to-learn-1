version: '3.8'

services:
  web:
    image: nginx:alpine
    ports:
      - '8080:80'
    volumes:
      - ./src:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d
    depends_on:
      - php

  php:
    build: .
    volumes:
      - ./src:/var/www/html
      - ./database:/var/www/database
    depends_on:
      - db
    environment:
      - DB_HOST=teste
      - DB_NOME=teste
      - DB_USER=teste
      - DB_PASS=teste

  db:
    image: mysql:8.4
    ports:
      - '3306:3306'
    environment:
      - MYSQL_ROOT_PASSWORD=teste
      - MYSQL_DATABASE=teste
      - MYSQL_USER=teste
      - MYSQL_PASSWORD=teste
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - '8081:80'
    environment:
      - PMA_HOST=db
    depends_on:
      - db

volumes:
  mysql_data:
